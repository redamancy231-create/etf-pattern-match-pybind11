# GPT-5.6-Sol (via Codex CLI), 2026-07-17
name: Sanitizer (ASAN+UBSAN)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  sanitizer:
    runs-on: ubuntu-latest

    env:
      PYTHONIOENCODING: utf-8
      SANITIZER_FLAGS: -fsanitize=address,undefined -fno-omit-frame-pointer

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pybind11 pytest

      - name: Configure sanitized build
        run: |
          python_path="$(python -c 'import sys; print(sys.executable)')"
          cmake -S . -B build-sanitizer \
            -DCMAKE_CXX_COMPILER=g++ \
            -DPython_EXECUTABLE="$python_path" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="$SANITIZER_FLAGS" \
            -DCMAKE_MODULE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build with ASAN and UBSAN
        run: cmake --build build-sanitizer --config Debug --parallel

      - name: Run existing Python tests under sanitizers
        run: |
          export ASAN_OPTIONS="detect_leaks=1:halt_on_error=0:log_path=${{ github.workspace }}/asan.log"
          export UBSAN_OPTIONS="halt_on_error=0:print_stacktrace=1:log_path=${{ github.workspace }}/ubsan.log"
          export LSAN_OPTIONS="suppressions=${{ github.workspace }}/.github/lsan.supp"
          export PYTHONPATH="${{ github.workspace }}/build-sanitizer${PYTHONPATH:+:$PYTHONPATH}"
          python -m pytest tests/ -v --timeout=60 || true
          python verify_etf_core.py || true
          python verify_batch.py || true
          # Report sanitizer findings (non-zero exit if issues found)
          if ls ${{ github.workspace }}/asan.log.* 2>/dev/null || ls ${{ github.workspace }}/ubsan.log.* 2>/dev/null; then
            echo "⚠ SANITIZER FINDINGS:"
            cat ${{ github.workspace }}/asan.log.* 2>/dev/null || true
            cat ${{ github.workspace }}/ubsan.log.* 2>/dev/null || true
            exit 1
          fi